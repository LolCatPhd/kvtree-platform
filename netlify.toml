[build]
  command = "npm run build"
  publish = ".next"
  base = "client"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"
  # Build runs `next build --webpack` (see client/package.json). Next 16 defaults
  # to Turbopack, whose production chunks aren't traced into Netlify's serverless
  # functions and fail at runtime with ChunkLoadError. --webpack is the real fix.

  # NEXT_PUBLIC_GOOGLE_MAPS_API_KEY is a *browser* key: NEXT_PUBLIC_* vars are
  # inlined into the client bundle by design (the Places autocomplete needs it in
  # the browser). It is locked down with HTTP-referrer + API restrictions in
  # Google Cloud, not by secrecy, so it is safe to ship. Tell Netlify's secret
  # scanner to ignore this env var's value — by key name, so the value stays out
  # of the repo. The private server key (GOOGLE_MAPS_API_KEY) is NOT listed here.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY"

  # Netlify also runs "smart detection", which flags anything matching a known
  # secret *pattern* (a Google key starts with "AIza…") regardless of env vars —
  # SECRETS_SCAN_OMIT_KEYS does not affect it. Since the only match is our public
  # browser key (above), disable the heuristic. The explicit env-var scan stays
  # on, so any genuinely private env var would still be caught.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# No manual redirects here — let the plugin handle routing
