[build]
  command = "npm run build"
  publish = ".next"
  base = "client"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.production.environment]
  NODE_ENV = "production"
  # API URL will be set in Netlify dashboard pointing to Railway deployment
  # Example: NEXT_PUBLIC_API_URL = "https://your-railway-app.up.railway.app"

[context.deploy-preview.environment]
  NODE_ENV = "development"

[context.branch-deploy.environment]
  NODE_ENV = "development"